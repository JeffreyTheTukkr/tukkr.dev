name: continuous integration

on:
  workflow_dispatch:
  pull_request:
  push:

jobs:
  linting:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
      - uses: pnpm/action-setup@v6
        with:
          version: 10
      - name: install dependencies
        run: pnpm install
      - name: run linting checks
        run: pnpm run lint
